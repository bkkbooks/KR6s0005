body:
  text: 釋氏要覽序功德主仙林住山壇主愚極宣德郎守尚書屯田員外郎上輕車都尉崔育林撰昔我佛妙正三身圓成四智不泥洹而自證運漚和以度人敷顯萬法指真實際導誨群性了根本空設三昧之門嚴具足之相盡有為之執歸無生之忍宗會覺海實蕃淨徒迨乎寂滅示往結集垂言經論以祖述教法以摽闡其為大也至極含受而不可限量其為小也細而不遺視之弗見窮無央之劫不可壞終內有之識不能稱錯綜端緒雖惟逮而莫周恢博開解非超越而不至將不由徑儔為所依則今要覽可由而致之也靡涉西流知五竺之本末不游法藏明萬行之節制動息隨用而立軌修習知趣而不迷包括微著詮乘諦以證之昭灼品例卷上下以勻之覽之者猶若太陽升而萬境廓然矣謂曰真如非在句義且夫一切之法無礙相中非學非知應學應知去聖彌遠毛角差別雖學雖知然後不足罔有行去聲向未臻而遠離於學可也因地果位繫之在功今誠公大師博富於有聞法施而留志承佛威力載集斯要曰智曰慧孰謂不敏時皇宋天禧四載李秋既望序而引之
